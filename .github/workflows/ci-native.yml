name: ci-native

on:
  push:
  pull_request:

jobs:
  native:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.2'
          dune-cache: true
      - run: opam install -y dune ocamlformat
      - run: opam exec -- ocamlformat --check src/catalog.ml src/json.ml src/runtime.ml bin/main.ml test/runtime_test.ml
      - run: opam exec -- dune build @all
      - run: opam exec -- dune runtest
